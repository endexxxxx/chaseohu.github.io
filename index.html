<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Cha Seohu</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease forwards;
    }

    h1 {
      font-size: 64px;
      letter-spacing: 6px;
      margin: 0;
      transition: 0.3s;
    }

    h1:hover {
      color: #00f0ff;
      text-shadow: 0 0 20px #00f0ff;
    }

    p {
      margin-top: 20px;
      font-size: 18px;
      opacity: 0.7;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CHA SEOHU</h1>
    <p>Future Developer 🚀</p>
  </div>
</body>
</html>
